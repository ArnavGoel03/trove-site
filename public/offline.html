<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>You are offline</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        background: #08080b;
        color: #fff;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        text-align: center;
        padding: 24px;
      }
      main {
        max-width: 420px;
      }
      h1 {
        font-size: 28px;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin: 0 0 12px;
      }
      p {
        color: #a1a1aa;
        font-size: 15px;
        line-height: 1.5;
        margin: 0 0 24px;
      }
      button {
        appearance: none;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.04);
        color: #fff;
        border-radius: 999px;
        padding: 10px 20px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
      }
      button:hover {
        background: rgba(255, 255, 255, 0.08);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>
        This page needs a network connection you do not have right now.
        Already-visited pages are still available from cache.
      </p>
      <button onclick="location.reload()">Try again</button>
    </main>
  </body>
</html>
